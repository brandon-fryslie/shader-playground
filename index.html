<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGPU Compute Shader Playground</title>
</head>
<body>

<div id="fallback">
  <h2>WebGPU Not Available</h2>
  <p>This playground requires WebGPU, which is available in Chrome 113+, Safari 18+, and Edge 113+. Please open this page in a supported browser.</p>
</div>

<div id="app">
  <div id="controls">
    <div class="mobile-drag-handle"><span></span></div>
    <div class="color-section">
      <div class="param-section-title" style="padding: 8px 16px 4px; margin: 0;">Color Theme</div>
      <div class="presets" id="theme-presets" style="padding: 4px 16px 8px;"></div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="physics">N-Body</button>
      <button class="mode-tab" data-mode="boids">Boids</button>
      <button class="mode-tab" data-mode="physics_classic">N-Body Classic</button>
      <button class="mode-tab" data-mode="fluid">Fluid</button>
      <button class="mode-tab" data-mode="parametric">Shapes</button>
      <button class="mode-tab" data-mode="reaction">Reaction</button>
    </div>
    <div class="mobile-mode-stepper">
      <button class="stepper-btn" id="mode-prev" aria-label="Previous mode">&#x276E;</button>
      <span class="stepper-label" id="mode-stepper-label">Boids</span>
      <button class="stepper-btn" id="mode-next" aria-label="Next mode">&#x276F;</button>
    </div>
    <div class="param-group active" data-mode="boids" id="params-boids"></div>
    <div class="param-group" data-mode="physics" id="params-physics"></div>
    <div class="param-group" data-mode="physics_classic" id="params-physics_classic"></div>
    <div class="param-group" data-mode="fluid" id="params-fluid"></div>
    <div class="param-group" data-mode="parametric" id="params-parametric"></div>
    <div class="param-group" data-mode="reaction" id="params-reaction"></div>
    <div class="global-controls">
      <div class="btn-row">
        <button class="ctrl-btn" id="btn-pause">Pause</button>
        <button class="ctrl-btn" id="btn-reset">Reset</button>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn" id="btn-reset-all" style="font-size:10px;color:var(--text-dim);">Reset All</button>
      </div>
    </div>
    <div class="debug-panel" data-mode="physics" id="debug-panel">
      <div class="debug-header">Debug / Time Control</div>
      <div class="debug-step-big">
        Step <span id="debug-step-num">0</span> <span id="debug-step-dir">&#x25B6;</span>
      </div>
      <div class="debug-step-row">
        <button class="ctrl-btn debug-step-btn" id="debug-rev60" title="Step back 60">&laquo;60</button>
        <button class="ctrl-btn debug-step-btn" id="debug-rev10" title="Step back 10">&laquo;10</button>
        <button class="ctrl-btn debug-step-btn" id="debug-rev1" title="Step back 1">&laquo;1</button>
        <button class="ctrl-btn debug-step-btn" id="debug-fwd1" title="Step forward 1">1&raquo;</button>
        <button class="ctrl-btn debug-step-btn" id="debug-fwd10" title="Step forward 10">10&raquo;</button>
        <button class="ctrl-btn debug-step-btn" id="debug-fwd60" title="Step forward 60">60&raquo;</button>
      </div>
      <div class="debug-row">
        <label class="debug-label" for="debug-skip-target">Skip to:</label>
        <input type="number" id="debug-skip-target" min="0" class="debug-input" placeholder="step #">
        <button class="ctrl-btn debug-action-btn" id="debug-skip-btn">Go</button>
      </div>
      <div class="debug-row">
        <label class="debug-label" for="debug-skip-chunk">Target speed:</label>
        <select id="debug-skip-chunk" class="debug-input">
          <option value="60">1x (live)</option>
          <option value="600">10x</option>
          <option value="6000" selected>100x</option>
          <option value="60000">1000x</option>
          <option value="1000000000">Max</option>
        </select>
      </div>
      <div class="debug-row">
        <label class="debug-label" for="debug-break-step">Break at:</label>
        <input type="number" id="debug-break-step" min="0" class="debug-input" placeholder="step #">
        <button class="ctrl-btn debug-action-btn" id="debug-break-btn">Set</button>
      </div>
      <div class="debug-row debug-break-status" id="debug-break-status" style="display:none">
        &#x25CF; Break at <span id="debug-break-val"></span>
        <button class="ctrl-btn debug-action-btn" id="debug-break-clear" title="Clear breakpoint">&times;</button>
      </div>
      <div class="debug-scrub-wrap">
        <input type="range" id="debug-scrub" min="0" max="0" value="0" class="debug-scrub">
        <div class="debug-scrub-label">
          <span>0</span><span id="debug-scrub-high">0</span>
        </div>
      </div>
      <div class="debug-row">
        <button class="ctrl-btn" id="debug-screenshot" style="flex:1;">Screenshot &#x2192; PNG</button>
      </div>
    </div>
  </div>
  <div id="canvas-container">
    <canvas id="gpu-canvas"></canvas>
    <div class="canvas-stats">
      <span id="stat-fps">FPS: --</span>
      <span id="stat-count">Particles: --</span>
      <span id="stat-step" style="display:none"></span>
    </div>
    <button class="xr-btn" id="btn-xr" disabled>Enter VR</button>
    <div class="mobile-fab">
      <button class="fab-btn" id="fab-pause" aria-label="Pause">&#x23F8;</button>
      <button class="fab-btn" id="fab-reset" aria-label="Reset">&#x21BA;</button>
      <button class="fab-btn" id="fab-rewind" aria-label="Rewind">&#x23EA;</button>
    </div>
    <button id="shader-toggle">&lt;/&gt;</button>
    <div id="shader-panel">
      <div class="shader-tabs" id="shader-tabs"></div>
      <div class="shader-editor-wrap">
        <textarea class="shader-editor" id="shader-editor" spellcheck="false"></textarea>
      </div>
      <div class="shader-toolbar">
        <button id="shader-compile">Compile</button>
        <button id="shader-reset">Reset</button>
        <span id="shader-status" class="shader-success"></span>
      </div>
    </div>
  </div>
  <div id="prompt-output">
    <div id="prompt-text">Initializing WebGPU...</div>
    <button id="copy-btn">Copy</button>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
