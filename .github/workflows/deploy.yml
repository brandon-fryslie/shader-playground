name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version slot
        id: version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            slot="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            slot="${{ github.ref_name }}"
          else
            count=$(git rev-list --count HEAD)
            short=$(git rev-parse --short HEAD)
            slot="r${count}-${short}"
          fi
          echo "slot=${slot}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci requires the lockfile to be in sync with node_modules for the current
      # platform. Vite 8 uses rolldown which has platform-native bindings — the lockfile
      # generated on macOS arm64 doesn't include the Linux x64 native packages CI needs.
      # npm install resolves correctly for the runner's platform without failing on this.
      - run: npm install

      - name: Build with explicit base URL
        env:
          VITE_BASE: /${{ github.event.repository.name }}/${{ steps.version.outputs.slot }}/
        run: npm run build

      - uses: brandon-fryslie/gh-pages-multiplexer@v1
        with:
          source-dir: dist
          version: ${{ steps.version.outputs.slot }}
          base-path-mode: none
